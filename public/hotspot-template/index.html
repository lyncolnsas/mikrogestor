<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wi-Fi Login</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #0f172a; color: white; }
        .card { background: #1e293b; padding: 2rem; border-radius: 1rem; text-align: center; max-width: 300px; }
        input { width: 100%; padding: 0.75rem; margin: 0.5rem 0; border: none; border-radius: 0.5rem; }
        button { width: 100%; padding: 0.75rem; background: #6366f1; color: white; border: none; border-radius: 0.5rem; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Conectar</h1>
        <p>Preencha os dados abaixo</p>
        <form action="$(link-login-only)" method="post">
            <input type="hidden" name="dst" value="$(link-orig)">
            <input type="hidden" name="popup" value="true">
            <input type="text" name="username" placeholder="Seu nome">
            <input type="text" name="phone" placeholder="Seu WhatsApp">
            <!-- Os campos devem bater com o que o MikroTik espera ou enviar para nossa API primeiro -->
            <button type="submit">Acessar Wi-Fi</button>
        </form>
    </div>
</body>
</html>
