services:
  # -----------------------------------------------------------------------------
  # APP CORE (Next.js)
  # -----------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: mikrogestor_app:local
    container_name: mikrogestor_app
    restart: unless-stopped
    # network_mode: service:wireguard  <-- REMOVED (Now running standalone with embedded WG)
    ports:
      - "3000:3000"
      - "51820:51820/udp"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - "/dev/net/tun:/dev/net/tun"
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?schema=management&search_path=management,tenant_template,radius
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_HOST=db
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - VPN_AUTO_REGISTER=true
      - VPN_SERVER_ID=default-ca-sync-01
      - VPN_SERVER_SECRET=ca-dev-secret-2025
      - VPN_PUBLIC_ENDPOINT=${VPN_HOST:-auto}
      - APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    volumes:
      - ./config/wireguard:/etc/wireguard
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      # wireguard:  <-- REMOVED
      #   condition: service_started

  # -----------------------------------------------------------------------------
  # DATABASE (PostgreSQL)
  # -----------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: mikrogestor_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-mikrogestor}" ]
      interval: 10s
      timeout: 5s
      retries: 25

  # -----------------------------------------------------------------------------
  # CACHE & QUEUE (Redis)
  # -----------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: mikrogestor_redis
    restart: always
    command: redis-server --save 60 1 --loglevel warning --stop-writes-on-bgsave-error no
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 15

  # -----------------------------------------------------------------------------
  # RADIUS SERVER (FreeRADIUS)
  # -----------------------------------------------------------------------------
  radius:
    build:
      context: .
      dockerfile: docker/radius/Dockerfile
    image: mikrogestor_radius:local
    container_name: mikrogestor_radius
    restart: always
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    depends_on:
      - db
    # volumes:
    #   Config files are now baked into the image with correct permissions
    #   - ./config/radius/clients.conf:/etc/raddb/clients.conf:ro
    #   - ./config/radius/mods-enabled/sql:/etc/raddb/mods-enabled/sql:ro
    # -----------------------------------------------------------------------------
    # VPN SERVER (Embedded in APP)
    # -----------------------------------------------------------------------------
    # WireGuard functionality is now handled entirely within the 'app' container
    # to simplify networking and avoid potential conflicts.
    # See scripts/docker-entrypoint.sh for initialization logic.

