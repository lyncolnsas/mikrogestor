# ============================================================================ 
# FreeRADIUS - Clientes Autorizados 
# ============================================================================ 
 
# Cliente local (para testes) 
client localhost { 
    ipaddr = 127.0.0.1 
    secret = testing123 
    require_message_authenticator = no 
    nas_type = other 
} 
 
# Cliente da rede Docker 
client docker_network { 
    ipaddr = 172.16.0.0/12 
    secret = mikrogestor_radius_secret 
    require_message_authenticator = no 
    nas_type = other 
} 
 
# Cliente da rede local 
client local_network { 
    ipaddr = 192.168.0.0/16 
    secret = mikrogestor_radius_secret 
    require_message_authenticator = no 
    nas_type = other 
} 
